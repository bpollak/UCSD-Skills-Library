<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UCSD Skills Library</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <style>
    :root {
      --navy: #061b34;
      --navy-2: #072b52;
      --blue: #00629b;
      --gold: #ffcd00;
      --gold-dark: #d7a300;
      --ink: #13233a;
      --muted: #667085;
      --line: #d8dee8;
      --line-soft: #edf1f6;
      --surface: #ffffff;
      --bg: #fbfcfe;
      --green: #147a4d;
      --amber: #a46100;
      --shadow: 0 16px 36px rgba(6, 27, 52, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      min-height: 78px;
      padding: 16px clamp(18px, 3vw, 38px);
      color: #fff;
      background: linear-gradient(180deg, var(--navy-2), var(--navy));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .wordmark {
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(25px, 3vw, 37px);
      line-height: 1;
      white-space: nowrap;
      position: relative;
    }

    .wordmark::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      height: 2px;
      background: var(--gold);
    }

    .brand-divider {
      width: 1px;
      height: 34px;
      background: rgba(255, 255, 255, 0.35);
    }

    .site-title {
      font-size: clamp(20px, 2vw, 29px);
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .search {
      width: min(380px, 34vw);
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 12px 14px;
      box-shadow: 0 1px 1px rgba(6, 27, 52, 0.02);
    }

    .wrap {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 34px clamp(18px, 3vw, 38px) 36px;
    }

    .storefront {
      display: grid;
      grid-template-columns: minmax(320px, 0.88fr) minmax(420px, 1.12fr);
      gap: 28px;
      align-items: start;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--navy);
      font-size: clamp(29px, 3.2vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtle {
      color: var(--muted);
      font-size: 14px;
    }

    .pack-list {
      display: grid;
      gap: 14px;
    }

    .pack-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 20px 22px;
      text-align: left;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      box-shadow: 0 1px 1px rgba(6, 27, 52, 0.02);
    }

    .pack-card:hover,
    .pack-card.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue), 0 12px 28px rgba(6, 27, 52, 0.07);
    }

    .pack-card strong {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-size: clamp(23px, 2.4vw, 29px);
      line-height: 1;
    }

    .pack-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: #edf5ff;
      color: var(--blue);
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .pack-card.active .pack-icon,
    .pack-card:hover .pack-icon {
      background: var(--navy);
      color: #fff;
    }

    .pack-icon svg {
      width: 17px;
      height: 17px;
      display: block;
    }

    .count {
      border-radius: 999px;
      padding: 4px 10px;
      background: #e9f2ff;
      color: #064f92;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pack-card p {
      margin: 10px 0 0;
      color: #3c4a5e;
      font-size: 15px;
    }

    .chevron {
      color: var(--navy);
      font-size: 30px;
      line-height: 1;
    }

    .install-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: clamp(18px, 2vw, 24px);
      box-shadow: var(--shadow);
    }

    .install-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(23px, 2.1vw, 28px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label,
    .field-label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }

    .select {
      width: 100%;
      border: 1px solid #c7cfdb;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 12px 14px;
    }

    .output-tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
      margin-bottom: 6px;
    }

    .tab {
      border: 0;
      border-right: 1px solid var(--line);
      background: #fff;
      color: var(--navy);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .tab:last-child {
      border-right: 0;
    }

    .tab.active {
      background: var(--navy);
      color: #fff;
    }

    .copybox {
      width: 100%;
      min-height: 104px;
      resize: vertical;
      border: 1px solid #c7cfdb;
      border-radius: 7px;
      background: #f8fafc;
      color: #0f2138;
      padding: 11px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 10px 16px;
      font-weight: 850;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      min-height: 42px;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--gold), #ebb000);
      border-color: var(--gold-dark);
      color: #07182b;
    }

    .btn-secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--navy);
    }

    .feedback {
      min-height: 16px;
      margin-top: 8px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
    }

    .catalog {
      margin-top: 28px;
    }

    .catalog-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    h3 {
      margin: 0;
      color: var(--navy);
      font-size: 24px;
      line-height: 1.2;
    }

    .skill-table {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .table-row {
      min-height: 58px;
      border-bottom: 1px solid var(--line-soft);
      display: grid;
      grid-template-columns: minmax(220px, 0.95fr) minmax(260px, 1.4fr) minmax(150px, 0.75fr) 110px;
      gap: 16px;
      align-items: center;
      padding: 13px 14px;
    }

    .table-row:last-child {
      border-bottom: 0;
    }

    .table-head {
      min-height: 44px;
      color: #344054;
      background: #fbfcfe;
      font-size: 13px;
      font-weight: 850;
    }

    .skill-title {
      min-width: 0;
    }

    .skill-title strong {
      display: block;
      color: var(--navy);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .description {
      color: #344054;
      font-size: 13px;
    }

    .pill {
      width: max-content;
      max-width: 100%;
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef4ff;
      color: #064f92;
      font-size: 12px;
      font-weight: 800;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .pill.optional {
      background: #eaf8ef;
      color: var(--green);
    }

    .small-copy {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--navy);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .copy-cell {
      position: relative;
      display: flex;
      justify-content: flex-end;
    }

    .copy-pop {
      position: absolute;
      right: 0;
      bottom: calc(100% + 7px);
      border-radius: 7px;
      background: var(--navy);
      color: #fff;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 850;
      line-height: 1;
      box-shadow: 0 10px 20px rgba(6, 27, 52, 0.16);
      pointer-events: none;
      white-space: nowrap;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .storefront {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 720px) {
      .brand {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .brand-divider {
        display: none;
      }

      .site-title {
        white-space: normal;
      }

      .install-head,
      .catalog-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .search {
        width: 100%;
      }

      .table-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .table-head {
        display: none;
      }

      .actions,
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="wordmark">UC San Diego</div>
      <div class="brand-divider" aria-hidden="true"></div>
      <div class="site-title">Skills Library</div>
    </div>
  </header>

  <main class="wrap">
    <section class="storefront" aria-label="Skill pack installer">
      <div>
        <h1>Choose a skill pack</h1>
        <div class="pack-list" id="pack-list"></div>
      </div>

      <aside class="install-panel" aria-label="Install selected skills">
        <div class="install-head">
          <div>
            <h2>Install skills</h2>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Copy option</div>
          <div class="output-tabs" role="tablist" aria-label="Copy output type">
            <button class="tab active" id="tab-script" data-output="script" type="button" role="tab" aria-selected="true">Install command</button>
            <button class="tab" id="tab-prompt" data-output="prompt" type="button" role="tab" aria-selected="false">Harness prompt</button>
          </div>
          <textarea id="output" class="copybox" spellcheck="false" aria-label="Generated install output"></textarea>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="copy-output" type="button">Copy install command</button>
        </div>
        <div class="feedback" id="feedback" role="status" aria-live="polite"></div>
      </aside>
    </section>

    <section class="catalog" aria-label="Current skills">
      <div class="catalog-head">
        <div>
          <h3>Current skills</h3>
          <p class="subtle" id="result-count">0 skills shown</p>
        </div>
        <input id="search" class="search" type="search" placeholder="Search skills..." aria-label="Search skills">
      </div>
      <div class="skill-table" id="skill-table"></div>
    </section>

    <div id="error" class="empty" hidden></div>
  </main>

  <script>
    const PACKS = {
      core: {
        label: "Core",
        title: "Core Skills",
        icon: "box",
        countLabel: "skill",
        description: "Real markdown skills available to add to an agent now."
      },
      optional: {
        label: "In Progress",
        title: "In Progress",
        icon: "spark",
        countLabel: "skill",
        description: "Real markdown skills still being reviewed before default install."
      },
      all: {
        label: "All Entries",
        title: "All Entries",
        icon: "grid",
        countLabel: "entry",
        description: "Core and in-progress markdown skills."
      }
    };

    const state = {
      skills: [],
      pack: "core",
      outputType: "script",
      search: ""
    };

    const els = {
      packList: document.querySelector("#pack-list"),
      skillTable: document.querySelector("#skill-table"),
      resultCount: document.querySelector("#result-count"),
      output: document.querySelector("#output"),
      copyOutput: document.querySelector("#copy-output"),
      feedback: document.querySelector("#feedback"),
      search: document.querySelector("#search"),
      error: document.querySelector("#error")
    };

    function normalizeSkill(skill, index) {
      const name = skill.name || skill.id || `skill-${index + 1}`;
      const status = normalizeStatus(skill.status || skill.phase || "planned");
      const publicationStatus = normalizeStatus(skill.publicationStatus || skill.publication || (skill.published ? "published" : "draft"));
      const links = Array.isArray(skill.links) ? skill.links : [];

      return {
        ...skill,
        id: skill.id || name,
        name,
        title: skill.title || titleCase(name),
        description: skill.description || "No description provided.",
        category: skill.category || "Uncategorized",
        status,
        publicationStatus,
        owner: skill.owner || "Unassigned",
        updated: skill.updated || skill.lastUpdated || "",
        links,
        skillPath: findSkillPath(links)
      };
    }

    function findSkillPath(links) {
      const link = links.find((item) => String(item.url || item).includes("/SKILL.md"));
      return link ? String(link.url || link).replace(/\/SKILL\.md$/, "") : "";
    }

    function normalizeStatus(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/_/g, "-")
        .replace(/\s+/g, "-") || "planned";
    }

    function titleCase(value) {
      return String(value)
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (letter) => letter.toUpperCase());
    }

    function packFor(skill) {
      return isDefaultInstall(skill) ? "core" : "optional";
    }

    function isDefaultInstall(skill) {
      return Boolean(skill.skillPath) && ["done", "built"].includes(skill.status);
    }

    function skillsForPack(pack = state.pack) {
      if (pack === "all") return state.skills;
      return state.skills.filter((skill) => packFor(skill) === pack);
    }

    function visibleSkills() {
      const query = state.search.trim().toLowerCase();
      return skillsForPack().filter((skill) => {
        if (!query) return true;
        return [
          skill.name,
          skill.title,
          skill.description,
          skill.category,
          skill.status,
          skill.publicationStatus
        ].some((field) => String(field || "").toLowerCase().includes(query));
      });
    }

    function render() {
      renderPacks();
      renderInstall();
      renderTable();
    }

    function renderPacks() {
      els.packList.innerHTML = Object.entries(PACKS).filter(([key]) => {
        return key === "all" || skillsForPack(key).length > 0;
      }).map(([key, pack]) => {
        const count = skillsForPack(key).length;
        return `
          <button class="pack-card ${key === state.pack ? "active" : ""}" data-pack="${escapeAttr(key)}" type="button">
            <span>
              <strong>
                <span class="pack-icon" aria-hidden="true">${packIcon(pack.icon)}</span>
                ${escapeHtml(pack.title)}
                <span class="count">${count} ${escapeHtml(countLabel(count, pack.countLabel))}</span>
              </strong>
              <p>${escapeHtml(pack.description)}</p>
            </span>
            <span class="chevron" aria-hidden="true">›</span>
          </button>
        `;
      }).join("");
    }

    function packIcon(name) {
      const attrs = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
      if (name === "grid") {
        return `<svg ${attrs}><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>`;
      }
      if (name === "spark") {
        return `<svg ${attrs}><path d="M12 3l1.7 4.4L18 9l-4.3 1.6L12 15l-1.7-4.4L6 9l4.3-1.6L12 3z"></path><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z"></path></svg>`;
      }
      return `<svg ${attrs}><path d="M21 8l-9-5-9 5 9 5 9-5z"></path><path d="M3 8v8l9 5 9-5V8"></path><path d="M12 13v8"></path></svg>`;
    }

    function countLabel(count, singular) {
      if (count === 1) return singular;
      return singular === "entry" ? "entries" : `${singular}s`;
    }

    function renderInstall() {
      const selected = skillsForPack();
      const ready = selected.filter(isDefaultInstall);

      els.output.value = state.outputType === "script" ? buildScript(selected, ready) : buildPrompt(selected);
      els.copyOutput.textContent = state.outputType === "script" ? "Copy install command" : "Copy harness prompt";
    }

    function buildScript(selected, ready) {
      const installerUrl = "https://raw.githubusercontent.com/dbalders/UCSD-Skills-Library/main/scripts/install-skills.sh";
      const installable = selected.filter((skill) => skill.skillPath);
      const skillNames = installable
        .map((skill) => skill.name)
        .join(" ");

      if (!skillNames) return "# No installable skill folders are available for this selection yet.";

      if (installable.length === 1) return `curl -fsSL ${installerUrl} | SKILLS="${skillNames}" bash`;

      const group = state.pack === "all" ? "all" : "core";
      return `curl -fsSL ${installerUrl} | GROUP="${group}" bash`;
    }

    function buildPrompt(selected) {
      const repoPath = "/Users/davidbalderston/Github/UCSD/AI Tools/UCSD-Skills-Library";
      const pack = PACKS[state.pack];
      const lines = selected.map((skill) => {
        const source = skill.skillPath ? skill.skillPath : `ideas.json entry: ${skill.id}`;
        return `- ${skill.name}: ${source}`;
      });

      return [
        "Add these UCSD Skills Library skills to this agent.",
        "",
        `Source repo: ${repoPath}`,
        `Pack: ${pack.label}`,
        "",
        "Skills:",
        lines.join("\n"),
        "",
        "Use the SKILL.md folder when present. For draft-only items, use the matching ideas.json entry as the source definition."
      ].join("\n");
    }

    function renderTable() {
      const rows = visibleSkills();
      els.resultCount.textContent = `${rows.length} skill${rows.length === 1 ? "" : "s"} shown in ${PACKS[state.pack].label}`;

      if (!rows.length) {
        els.skillTable.innerHTML = `<div class="empty">No skills match the current search.</div>`;
        return;
      }

      els.skillTable.innerHTML = `
        <div class="table-row table-head">
          <span>Skill</span>
          <span>Description</span>
          <span>Category</span>
          <span></span>
        </div>
        ${rows.map((skill) => `
          <div class="table-row">
            <div class="skill-title">
              <strong>${escapeHtml(skill.title)}</strong>
              <span>${escapeHtml(skill.name)}</span>
            </div>
            <div class="description">${escapeHtml(skill.description)}</div>
            <div>
              <span class="pill ${packFor(skill) === "optional" ? "optional" : ""}">${escapeHtml(skill.category)}</span>
            </div>
            <div class="copy-cell">
              <button class="small-copy" data-skill="${escapeAttr(skill.id)}" type="button">Copy prompt</button>
            </div>
          </div>
        `).join("")}
      `;
    }

    async function copyText(text, successMessage) {
      if (await copyPlainText(text)) {
        showFeedback(successMessage);
        return;
      }

      els.output.focus();
      els.output.select();
      showFeedback("Select text and press Cmd+C to copy.");
    }

    async function copyPlainText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (error) {
        const fallback = document.createElement("textarea");
        fallback.value = text;
        fallback.setAttribute("readonly", "");
        fallback.style.position = "fixed";
        fallback.style.left = "-9999px";
        document.body.append(fallback);
        fallback.select();

        let copied = false;
        try {
          copied = document.execCommand("copy");
        } catch (fallbackError) {
          copied = false;
        }

        fallback.remove();
        return copied;
      }
    }

    function showFeedback(message) {
      els.feedback.textContent = message;
      clearTimeout(showFeedback.timer);
      showFeedback.timer = setTimeout(() => {
        els.feedback.textContent = "";
      }, 2600);
    }

    function showRowCopied(button, message = "Copied") {
      const cell = button.closest(".copy-cell");
      if (!cell) return;
      cell.querySelector(".copy-pop")?.remove();

      const pop = document.createElement("span");
      pop.className = "copy-pop";
      pop.textContent = message;
      cell.append(pop);

      clearTimeout(button.copyTimer);
      button.copyTimer = setTimeout(() => {
        pop.remove();
      }, 1400);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    els.packList.addEventListener("click", (event) => {
      const button = event.target.closest(".pack-card");
      if (!button) return;
      state.pack = button.dataset.pack;
      render();
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        state.outputType = tab.dataset.output;
        document.querySelectorAll(".tab").forEach((item) => {
          const active = item === tab;
          item.classList.toggle("active", active);
          item.setAttribute("aria-selected", String(active));
        });
        renderInstall();
      });
    });

    els.copyOutput.addEventListener("click", () => {
      const label = state.outputType === "script" ? "Install command" : "Harness prompt";
      copyText(els.output.value, `${label} copied.`);
    });

    els.search.addEventListener("input", () => {
      state.search = els.search.value;
      renderTable();
    });

    els.skillTable.addEventListener("click", async (event) => {
      const button = event.target.closest(".small-copy");
      if (!button) return;
      const skill = state.skills.find((item) => item.id === button.dataset.skill);
      if (!skill) return;
      await copyPlainText(buildPrompt([skill]));
      showRowCopied(button);
    });

    async function loadSkills() {
      try {
        const response = await fetch("ideas.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`ideas.json returned ${response.status}`);
        const data = await response.json();
        state.skills = data.map(normalizeSkill);
      } catch (error) {
        state.skills = [];
        els.error.hidden = false;
        els.error.textContent = "Could not load ideas.json. Serve this folder over HTTP to populate the skills storefront.";
      }
      render();
    }

    loadSkills();
  </script>
</body>
</html>
