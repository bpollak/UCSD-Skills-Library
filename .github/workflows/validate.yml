name: validate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    # Only same-repo PRs use pull_request_target; fork PRs stay on pull_request.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation deps
        run: pip install --quiet pyyaml jsonschema

      - name: Validate structure & catalog
        run: python3 scripts/validate.py --ci

      - name: Security scan (secret gate + advisory review)
        run: python3 scripts/security_scan.py --ci

  # Optional hardening: enable a dedicated secret scanner across full history.
  # Free for public repos; for private repos a GITLEAKS_LICENSE secret is required.
